# Replaces stock UBI nginx config. OpenShift console proxies the plugin over HTTPS
# using the Service Serving CA; HTTP 8080 is for kubelet probes and in-pod checks only.
# Fixed count avoids OOM with worker_processes auto on high-CPU nodes under a tight memory limit.
worker_processes 2;
# warn hides routine worker start notices; use info when debugging nginx itself.
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    server {
        listen 8080;
        listen [::]:8080;
        server_name _;
        root /usr/share/nginx/html;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }

    server {
        listen 8443 ssl;
        listen [::]:8443 ssl;
        server_name _;
        ssl_certificate /var/serving-cert/tls.crt;
        ssl_certificate_key /var/serving-cert/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        root /usr/share/nginx/html;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
